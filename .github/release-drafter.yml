name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

template: |
  # What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

categories:
  - title: ':boom: Breaking'
    labels:
      - breaking

  - title: ':sparkles: New Features & Enhancements'
    labels:
      - enhancement
  
  - title: ':wastebasket: Deprecated'
    labels:
      - deprecate
      - deprecated

  - title: ':lock: Security'
    labels:
      - security

  - title: ':bug: Bug Fixes'
    labels:
      - bug

  - title: ':jigsaw: Miscellaneous'
    labels:
      - miscellaneous

  - title: ':memo: Documentation'
    collapse-after: 3
    labels:
      - documentation

  - title: ':white_check_mark: Tests'
    collapse-after: 3
    labels:
      - test

  - title: ':wrench: Maintenance'
    collapse-after: 3
    labels:
      - maintenance

  - title: ':pencil2: Typos'
    collapse-after: 3
    labels:
      - typo

  - title: ':robot: Automated'
    collapse-after: 3
    labels:
      - tastendruck

  - title: '️:arrow_upper_right: Dependencies'
    collapse-after: 3
    labels:
      - dependencies # Default label used by Dependabot

exclude-labels:
  - invalid
  - revert
  - 'skip release'

version-resolver:
  major:
    labels:
      - breaking
  minor:
    labels:
      - enhancement
  default: patch
