name: Audit Go

on:
  workflow_call:
    inputs:
      go-experiment:
        default: ""
        type: string

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: ${{ inputs.go-experiment }}
    steps:
      - uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
