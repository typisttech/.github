name: Audit Go

on:
  workflow_call:
    inputs:
      go-experiment:
        default: ""
        type: string

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: ${{ inputs.go-experiment }}
    steps:
      - uses: golang/govulncheck-action@31f7c5463448f83528bd771c2d978d940080c9fd # master
