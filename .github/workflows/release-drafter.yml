name: Release Drafter

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:

concurrency:
  group: dot-github-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release-drafter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: release-drafter/release-drafter@5de93583980a40bd78603b6dfdcda5b4df377b32 # v7.2.0
