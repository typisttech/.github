name: Lint Go

on:
  workflow_call:
    inputs:
      go-version-file:
        description: Path to the go.mod or go.work file.
        default: go.mod
        type: string

      go-experiment:
        default: ""
        type: string

      # golangci-lint
      golangci-lint:
        description: Whether to run golangci-lint
        default: false
        type: boolean

      golangci-lint-version:
        description: The version of golangci-lint to use.
        type: string

      golangci-lint-version-file:
        description: |
          Gets the version of golangci-lint to use from a file.
          The path must be relative to the root of the project, or the `working-directory` if defined.
          This parameter supports `.golangci-lint-version`, and `.tool-versions` files.
        type: string

permissions:
  contents: read

jobs:
  go-mod-tidy-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - run: go mod tidy -diff
        shell: bash

  golangci-lint:
    if: ${{ inputs.golangci-lint }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: ${{ inputs.golangci-lint-version }}
          version-file: ${{ inputs.golangci-lint-version-file }}
          install-mode: binary
        env:
          GOEXPERIMENT: ${{ inputs.go-experiment }}
