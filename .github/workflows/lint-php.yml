name: Lint PHP

on:
  workflow_call:
    inputs:
      # composer-normalize
      composer-normalize:
        description: Whether to run composer-normalize
        default: true
        type: boolean

      # phpstan
      phpstan:
        description: Whether to run phpstan
        default: false
        type: boolean

      # box
      box:
        description: Whether to validate box config
        default: false
        type: boolean
      box-php-version:
        description: Setup PHP version for box.
        default: '8.5'
        type: string
      box-version:
        description: Setup box version.
        default: '4'
        type: string

permissions:
  contents: read

jobs:
  composer-normalize:
    if: ${{ inputs.composer-normalize }}
    runs-on: ubuntu-latest
    steps:
    - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
      with:
        php-version: '8.5'
        coverage: none
        tools: "composer-normalize:2"

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
        sparse-checkout: composer.json
        sparse-checkout-cone-mode: false

    - run: composer-normalize --dry-run
      shell: bash

  php-matrix:
    if: ${{ inputs.phpstan }}
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.php-matrix.outputs.versions }}
      lowest: ${{ steps.php-matrix.outputs.lowest }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          sparse-checkout: composer.json

      - uses: typisttech/php-matrix-action@65bbdaffdb0be005bda1ee30b7815b8dbf8b00d1 # v3.0.1
        id: php-matrix

  phpstan:
    if: ${{ inputs.phpstan }}
    needs: php-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ${{ fromJSON(needs.php-matrix.outputs.versions) }}
        dependency-versions:
          - highest
        include:
          - php-version: ${{ needs.php-matrix.outputs.lowest }}
            dependency-versions: locked

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0
        with:
          dependency-versions: ${{ matrix.dependency-versions }}

      - run: vendor/bin/phpstan analyse --error-format=github

  box:
    if: ${{ inputs.box }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ inputs.box-php-version }}
          coverage: none
          tools: "box:${{ inputs.box-version }}"

      - run: box validate
